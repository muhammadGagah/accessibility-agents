name: Installer Dry Run

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'update.sh'
      - 'update.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - 'scripts/installer-common.sh'
      - 'scripts/Installer.Common.ps1'
      - '.github/workflows/installer-dry-run.yml'
  push:
    branches:
      - main
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'update.sh'
      - 'update.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - 'scripts/installer-common.sh'
      - 'scripts/Installer.Common.ps1'
      - '.github/workflows/installer-dry-run.yml'
  workflow_dispatch:

jobs:
  macos-system-bash-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show system bash version
        run: /bin/bash --version

      - name: Install dry run
        run: /bin/bash ./install.sh --project --dry-run --yes --summary=.a11y-agent-team-install-plan.json

      - name: Update dry run
        run: /bin/bash ./update.sh --project --dry-run --summary=.a11y-agent-team-update-plan.json

      - name: Uninstall dry run
        run: /bin/bash ./uninstall.sh --project --dry-run --summary=.a11y-agent-team-uninstall-plan.json

      - name: Validate shell summaries
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          required = [
              Path('.a11y-agent-team-install-plan.json'),
              Path('.a11y-agent-team-update-plan.json'),
              Path('.a11y-agent-team-uninstall-plan.json'),
          ]
          for path in required:
              data = json.loads(path.read_text())
              assert data['schemaVersion'] == '1.0', path
              assert data['dryRun'] is True, path
              assert data['check'] is False, path
              assert 'timestampUtc' in data, path
              assert 'requestedOptions' in data, path
              backup = Path(data['backupMetadataPath'])
              assert backup.exists(), backup
              backup_data = json.loads(backup.read_text())
              assert backup_data['dryRun'] is True, backup
              assert backup_data['check'] is False, backup
          PY

  powershell-dry-run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dry run
        shell: powershell
        run: .\install.ps1 -Project -DryRun -Yes --summary .a11y-agent-team-install-plan.json

      - name: Update dry run
        shell: powershell
        run: .\update.ps1 -Project -DryRun --summary .a11y-agent-team-update-plan.json

      - name: Uninstall dry run
        shell: powershell
        run: .\uninstall.ps1 --project --dry-run --summary .a11y-agent-team-uninstall-plan.json

      - name: Validate PowerShell summaries
        shell: powershell
        run: |
          $paths = @(
            '.a11y-agent-team-install-plan.json',
            '.a11y-agent-team-update-plan.json',
            '.a11y-agent-team-uninstall-plan.json'
          )
          foreach ($path in $paths) {
            $data = Get-Content $path -Raw | ConvertFrom-Json
            if ($data.schemaVersion -ne '1.0') { throw "Unexpected schemaVersion in $path" }
            if (-not $data.dryRun) { throw "Expected dryRun=true in $path" }
            if ($data.check) { throw "Expected check=false in $path" }
                  - name: Validate shell script syntax
                    run: |
                      /bin/bash -n ./install.sh
                      /bin/bash -n ./update.sh
                      /bin/bash -n ./uninstall.sh
            if (-not $data.timestampUtc) { throw "Missing timestampUtc in $path" }
            if (-not $data.requestedOptions) { throw "Missing requestedOptions in $path" }
            if (-not $data.backupMetadataPath) { throw "Missing backupMetadataPath in $path" }
            if (-not (Test-Path $data.backupMetadataPath)) { throw "Missing backup metadata file for $path" }
            $backup = Get-Content $data.backupMetadataPath -Raw | ConvertFrom-Json
            if (-not $backup.dryRun) { throw "Expected backup dryRun=true for $path" }
            if ($backup.check) { throw "Expected backup check=false for $path" }
          }

  macos-system-bash-integration:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show system bash version
        run: /bin/bash --version

      - name: Project install, check, update check, uninstall check, uninstall
        run: |
          set -euo pipefail
          project_root="$(mktemp -d)"
          cd "$project_root"

          /bin/bash "$GITHUB_WORKSPACE/install.sh" --project --summary=.a11y-agent-team-install-summary.json
          test -d .claude/agents

          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.a11y-agent-team-install-summary.json').read_text())
          backup = json.loads(Path(data['backupMetadataPath']).read_text())
          assert data['dryRun'] is False
          assert data['check'] is False
          assert backup['dryRun'] is False
          assert backup['check'] is False
          PY

          /bin/bash "$GITHUB_WORKSPACE/install.sh" --project --check --summary=.a11y-agent-team-install-plan.json
          /bin/bash "$GITHUB_WORKSPACE/update.sh" --project --check --summary=.a11y-agent-team-update-plan.json
          /bin/bash "$GITHUB_WORKSPACE/uninstall.sh" --project --check --summary=.a11y-agent-team-uninstall-plan.json
                  - name: Validate PowerShell script syntax
                    shell: powershell
                    run: |
                      [ScriptBlock]::Create((Get-Content .\install.ps1 -Raw)) | Out-Null
                      [ScriptBlock]::Create((Get-Content .\update.ps1 -Raw)) | Out-Null
                      [ScriptBlock]::Create((Get-Content .\uninstall.ps1 -Raw)) | Out-Null

          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in [
              Path('.a11y-agent-team-install-plan.json'),
              Path('.a11y-agent-team-update-plan.json'),
              Path('.a11y-agent-team-uninstall-plan.json'),
          ]:
              data = json.loads(path.read_text())
              backup = json.loads(Path(data['backupMetadataPath']).read_text())
              assert data['check'] is True, path
              assert data['dryRun'] is False, path
              assert backup['check'] is True, path
              assert backup['dryRun'] is False, path
          PY

          /bin/bash "$GITHUB_WORKSPACE/uninstall.sh" --project --summary=.a11y-agent-team-uninstall-summary.json
          test ! -d .claude/agents

          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.a11y-agent-team-uninstall-summary.json').read_text())
          backup = json.loads(Path(data['backupMetadataPath']).read_text())
          assert data['check'] is False
          assert data['dryRun'] is False
          assert backup['check'] is False
          assert backup['dryRun'] is False
          PY